<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #000;
    color: #fff;
    font-family: Georgia, serif;
    overflow: hidden;
    position: relative;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .content {
    position: absolute;
    left: 80px;
    top: 160px;
  }
  .name {
    font-size: 86px;
    font-style: italic;
    font-weight: 400;
    line-height: 1;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 32px;
    font-style: italic;
    color: rgba(255,255,255,0.45);
    margin-bottom: 28px;
  }
  .divider {
    width: 500px;
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin-bottom: 28px;
  }
  .stats {
    font-family: monospace;
    font-size: 20px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 14px;
  }
  .cta {
    font-family: monospace;
    font-size: 20px;
    color: rgba(255,255,255,0.55);
  }
  .url {
    position: absolute;
    bottom: 48px;
    left: 80px;
    font-family: monospace;
    font-size: 24px;
    color: rgba(255,255,255,0.25);
  }
  .watermark {
    position: absolute;
    right: -40px;
    bottom: -60px;
    font-size: 400px;
    font-style: italic;
    color: rgba(255,255,255,0.03);
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="watermark">S</div>
  <div class="content">
    <div class="name">Samprati Gaurav</div>
    <div class="tagline">Cybersecurity Student · Builder · Writer</div>
    <div class="divider"></div>
    <div class="stats">15 articles · 159 commits · 6 certs · 1 live project</div>
    <div class="cta">Open to internships & collaborations →</div>
  </div>
  <div class="url">samprati.dev</div>
</body>
</html>
